<!doctype html>
<html lang="ko" class="no-js">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero preview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
  html,body{margin:0;background:#07070f;}
  body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;}
.hx-hero{
  --hx-bg:#07070f;
  --hx-s1:4px; --hx-s2:8px; --hx-s3:12px; --hx-s4:16px; --hx-s5:24px;
  --hx-s6:32px; --hx-s7:48px; --hx-s8:64px; --hx-s9:96px;
  --hx-violet:#8b5cf6; --hx-blue:#3b82f6;
  --hx-glass:rgba(255,255,255,0.045);
  --hx-glass-strong:rgba(255,255,255,0.07);
  --hx-stroke:rgba(255,255,255,0.10);
  --hx-text:#f4f4fb;
  --hx-muted:rgba(198,201,222,0.78);
  --hx-faint:rgba(160,164,186,0.70);
  position:relative; isolation:isolate; overflow:hidden;
  background:var(--hx-bg); color:var(--hx-text);
  font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
  word-break:keep-all;
  display:flex; justify-content:center;
  padding-block:clamp(var(--hx-s8),12vw,var(--hx-s9));
  padding-inline:clamp(var(--hx-s4),5vw,var(--hx-s7));
}
.hx-hero *{box-sizing:border-box;}

.hx-bg{position:absolute; inset:0; z-index:-1; pointer-events:none;}
.hx-net{position:absolute; inset:0; width:100%; height:100%; opacity:.55;}
.hx-glow{position:absolute; border-radius:50%; filter:blur(90px);}
.hx-glow--violet{
  width:46vw; height:46vw; max-width:640px; max-height:640px;
  top:-14%; left:-8%;
  background:radial-gradient(circle,rgba(139,92,246,0.50),transparent 68%); opacity:.55;
}
.hx-glow--blue{
  width:40vw; height:40vw; max-width:560px; max-height:560px;
  bottom:-20%; right:-6%;
  background:radial-gradient(circle,rgba(59,130,246,0.30),transparent 70%); opacity:.40;
}

.hx-inner{
  position:relative; width:100%; max-width:1100px;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  gap:clamp(var(--hx-s7),7vw,var(--hx-s9));
}

.hx-title{
  margin:0; font-weight:800;
  font-size:clamp(28px,1.1rem+4.4vw,60px);
  line-height:1.14; letter-spacing:-0.032em;
  max-width:18ch;
}
.hx-line{display:block; opacity:0; transform:translateY(18px);
  transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1);}
.hx-line:nth-child(2){transition-delay:.12s;}
.hx-hero.is-in .hx-line{opacity:1; transform:none;}
.hx-grad{
  background:linear-gradient(100deg,#a78bfa 0%,#818cf8 46%,#60a5fa 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
}
.hx-dot{
  -webkit-text-fill-color:#60a5fa; color:#60a5fa; font-weight:900;
  margin-left:0.02em; text-shadow:0 0 18px rgba(96,165,250,0.6);
}

.hx-pipeline{
  display:flex; align-items:stretch; justify-content:center; flex-wrap:wrap;
  gap:clamp(var(--hx-s2),1.4vw,var(--hx-s4));
  width:100%;
}
.hx-stage{
  flex:1 1 150px; min-width:128px; max-width:200px;
  opacity:0; transform:translateY(22px) scale(.97);
  transition:opacity .6s ease, transform .6s cubic-bezier(.2,.7,.2,1);
  transition-delay:calc(.18s + var(--i) * .09s);
}
.hx-hero.is-in .hx-stage{opacity:1; transform:none;}

.hx-card{
  position:relative; height:100%;
  display:flex; flex-direction:column; align-items:center; gap:var(--hx-s3);
  padding:clamp(var(--hx-s4),2vw,var(--hx-s5)) var(--hx-s3) clamp(var(--hx-s4),2vw,var(--hx-s5));
  border-radius:18px;
  background:linear-gradient(165deg,var(--hx-glass-strong),var(--hx-glass));
  border:1px solid var(--hx-stroke);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.08) inset,
    0 18px 40px -22px rgba(0,0,0,0.85),
    0 4px 14px -8px rgba(0,0,0,0.6);
  transition:transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, border-color .35s ease;
}
.hx-card::after{
  content:""; position:absolute; inset:0; border-radius:inherit; padding:1px;
  background:linear-gradient(160deg,rgba(167,139,250,0.5),rgba(255,255,255,0.04) 42%,rgba(96,165,250,0.28));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  opacity:.5; pointer-events:none; transition:opacity .35s ease;
}
.hx-card:hover{
  transform:translateY(-6px); border-color:rgba(255,255,255,0.16);
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.12) inset,
    0 26px 52px -22px rgba(0,0,0,0.9),
    0 0 0 1px rgba(167,139,250,0.18);
}
.hx-card:hover::after{opacity:.85;}

.hx-tile{
  display:flex; align-items:center; justify-content:center;
  width:clamp(44px,5vw,56px); height:clamp(44px,5vw,56px);
  border-radius:14px; font-size:clamp(20px,2.4vw,26px); color:#c7c4f5;
  background:linear-gradient(160deg,rgba(139,92,246,0.20),rgba(59,130,246,0.12));
  border:1px solid rgba(255,255,255,0.10);
  box-shadow:0 1px 0 0 rgba(255,255,255,0.10) inset;
  transition:transform .35s cubic-bezier(.2,.7,.2,1);
}
.hx-card:hover .hx-tile{transform:scale(1.06);}
.hx-ko{font-size:clamp(14px,1.5vw,17px); font-weight:700; letter-spacing:-0.01em; color:var(--hx-text); line-height:1.3;}
.hx-en{font-size:12px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--hx-faint); line-height:1.2;}

.hx-card--hero{
  background:linear-gradient(160deg,rgba(96,165,250,0.22),rgba(139,92,246,0.16));
  border-color:rgba(167,170,255,0.34);
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.16) inset,
    0 22px 50px -20px rgba(59,90,246,0.45),
    0 0 32px -6px rgba(120,110,255,0.40);
}
.hx-card--hero::before{
  content:""; position:absolute; inset:-1px; border-radius:inherit;
  background:radial-gradient(120% 90% at 50% 0%,rgba(130,130,255,0.40),transparent 60%);
  filter:blur(14px); opacity:.65; z-index:-1;
}
.hx-card--hero::after{
  opacity:.9;
  background:linear-gradient(160deg,rgba(96,165,250,0.8),rgba(255,255,255,0.10) 45%,rgba(167,139,250,0.65));
}
.hx-card--hero .hx-tile{
  color:#e7ebff;
  background:linear-gradient(160deg,#4f9bff,#9b7dff);
  border-color:rgba(255,255,255,0.22);
}
.hx-card--hero .hx-en{color:#bcd2ff;}
.hx-stage--key{transform:translateY(22px) scale(.97);}
.hx-hero.is-in .hx-stage--key{transform:translateY(-4px);}
.hx-card--hero:hover{transform:translateY(-6px);}

.hx-link{
  display:flex; align-items:center; justify-content:center; align-self:center;
  font-size:clamp(16px,1.6vw,20px); color:rgba(167,160,255,0.5);
  opacity:0; transform:scale(.6);
  transition:opacity .5s ease, transform .5s ease;
  transition-delay:calc(.26s + var(--i) * .09s);
}
.hx-link i{
  display:inline-block;
  background:linear-gradient(90deg,#8b5cf6,#60a5fa);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  animation:hx-flow 2.6s ease-in-out infinite;
  animation-delay:calc(var(--i) * .18s);
}
.hx-hero.is-in .hx-link{opacity:1; transform:none;}
@keyframes hx-flow{0%,100%{opacity:.4; transform:translateX(0);}50%{opacity:1; transform:translateX(3px);}}

.hx-chips{
  list-style:none; margin:0; padding:0;
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:clamp(var(--hx-s2),1.2vw,var(--hx-s3));
  max-width:920px;
}
.hx-chip{
  display:inline-flex; align-items:center;
  padding:var(--hx-s3) clamp(var(--hx-s4),1.6vw,var(--hx-s5));
  font-size:clamp(13px,1.3vw,15px); font-weight:500; color:#e4e4f2; line-height:1.2;
  border-radius:999px;
  background:linear-gradient(160deg,var(--hx-glass-strong),var(--hx-glass));
  border:1px solid var(--hx-stroke);
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
  box-shadow:0 1px 0 0 rgba(255,255,255,0.08) inset,0 10px 24px -16px rgba(0,0,0,0.8);
  opacity:0; transform:translateY(14px);
  transition:opacity .55s ease, transform .55s cubic-bezier(.2,.7,.2,1), border-color .3s ease, background .3s ease;
  transition-delay:calc(.55s + var(--i) * .07s);
}
.hx-chip b{
  font-weight:800; font-size:1.12em; margin-right:0.12em;
  background:linear-gradient(100deg,var(--hx-violet),#60a5fa);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
}
.hx-hero.is-in .hx-chip{opacity:1; transform:none;}
.hx-chip:hover{
  transform:translateY(-3px); border-color:rgba(167,139,250,0.4); color:#fff;
  background:linear-gradient(160deg,rgba(139,92,246,0.16),rgba(255,255,255,0.05));
}

/* will-change applied only while the entry animation is armed, removed after */
.hx-hero.is-armed .hx-stage,
.hx-hero.is-armed .hx-chip{will-change:transform,opacity;}

/* keyboard focus parity with hover */
.hx-card:focus-visible,
.hx-stage:focus-within .hx-card{
  outline:none; transform:translateY(-6px); border-color:rgba(167,139,250,0.55);
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.12) inset,
    0 26px 52px -22px rgba(0,0,0,0.9),
    0 0 0 2px rgba(167,139,250,0.45);
}
.hx-chip:focus-visible{
  outline:none; transform:translateY(-3px);
  border-color:rgba(167,139,250,0.55); color:#fff;
  box-shadow:0 0 0 2px rgba(167,139,250,0.45);
}

/* ---- Mobile: 1-column vertical value-chain with down-chevron connectors ---- */
@media (max-width:680px){
  .hx-pipeline{
    flex-direction:column; flex-wrap:nowrap; align-items:stretch;
    gap:var(--hx-s2);
    max-width:360px; margin-inline:auto;
  }
  .hx-stage{
    flex:0 0 auto; max-width:none; min-width:0; width:100%;
  }
  .hx-card{flex-direction:row; justify-content:flex-start; text-align:left; gap:var(--hx-s4);}
  .hx-card .hx-en{margin-left:auto;}
  /* hero stays in normal flow — emphasis via border/glow only, no full-width takeover */
  .hx-hero.is-in .hx-stage--key{transform:none;}
  /* connectors become vertical down-chevrons, preserving sequential narrative */
  .hx-link{
    transform:scale(.6);
    margin-block:calc(var(--hx-s1) * -1);
  }
  .hx-link i{transform:rotate(90deg);}
  .hx-hero.is-in .hx-link{transform:none;}
  @keyframes hx-flow{0%,100%{opacity:.4; transform:rotate(90deg) translateX(0);}50%{opacity:1; transform:rotate(90deg) translateX(3px);}}
}

/* JS-off fallback: html.no-js is removed by the script the instant it runs,
   so when JS is present these never apply and entry animations play. */
.no-js .hx-line,
.no-js .hx-stage,
.no-js .hx-link,
.no-js .hx-chip{opacity:1 !important; transform:none !important;}

@media (prefers-reduced-motion:reduce){
  .hx-net{display:none;}
  .hx-line,.hx-stage,.hx-link,.hx-chip{
    opacity:1 !important; transform:none !important; transition:none !important; will-change:auto;
  }
  .hx-hero.is-in .hx-stage--key{transform:none !important;}
  .hx-card,.hx-chip,.hx-tile{transition:none !important;}
  .hx-link i{
    animation:none !important;
    -webkit-text-fill-color:rgba(167,160,255,0.6); color:rgba(167,160,255,0.6);
  }
  @media (max-width:680px){.hx-link i{transform:rotate(90deg);}}
}
</style>
</head>
<body>
<section class="hx-hero" id="hx-hero" aria-label="소개">
  <div class="hx-bg" aria-hidden="true">
    <div class="hx-glow hx-glow--violet"></div>
    <div class="hx-glow hx-glow--blue"></div>
    <canvas class="hx-net" id="hxNet"></canvas>
  </div>

  <div class="hx-inner">
    <h1 class="hx-title">
      <span class="hx-line">사업과 서비스를 기획하고,</span>
      <span class="hx-line"><span class="hx-grad">풀스택으로 직접 개발합니다</span><span class="hx-dot">.</span></span>
    </h1>

    <div class="hx-pipeline" role="list" aria-label="밸류체인 파이프라인">
      <div class="hx-stage" role="listitem" style="--i:0">
        <div class="hx-card">
          <span class="hx-tile"><i class="ti ti-bulb" aria-hidden="true"></i></span>
          <span class="hx-ko">아이디어 발굴</span>
          <span class="hx-en">Discovery</span>
        </div>
      </div>
      <span class="hx-link" aria-hidden="true" style="--i:0"><i class="ti ti-chevron-right"></i></span>

      <div class="hx-stage" role="listitem" style="--i:1">
        <div class="hx-card">
          <span class="hx-tile"><i class="ti ti-target-arrow" aria-hidden="true"></i></span>
          <span class="hx-ko">GTM</span>
          <span class="hx-en">Go-To-Market</span>
        </div>
      </div>
      <span class="hx-link" aria-hidden="true" style="--i:1"><i class="ti ti-chevron-right"></i></span>

      <div class="hx-stage hx-stage--key" role="listitem" style="--i:2">
        <div class="hx-card hx-card--hero">
          <span class="hx-tile"><i class="ti ti-box" aria-hidden="true"></i></span>
          <span class="hx-ko">제품화</span>
          <span class="hx-en">Build</span>
        </div>
      </div>
      <span class="hx-link" aria-hidden="true" style="--i:2"><i class="ti ti-chevron-right"></i></span>

      <div class="hx-stage" role="listitem" style="--i:3">
        <div class="hx-card">
          <span class="hx-tile"><i class="ti ti-settings" aria-hidden="true"></i></span>
          <span class="hx-ko">운영</span>
          <span class="hx-en">Operate</span>
        </div>
      </div>
      <span class="hx-link" aria-hidden="true" style="--i:3"><i class="ti ti-chevron-right"></i></span>

      <div class="hx-stage" role="listitem" style="--i:4">
        <div class="hx-card">
          <span class="hx-tile"><i class="ti ti-trending-up" aria-hidden="true"></i></span>
          <span class="hx-ko">수익화</span>
          <span class="hx-en">Monetize</span>
        </div>
      </div>
    </div>

    <ul class="hx-chips" aria-label="주요 성과">
      <li class="hx-chip" style="--i:0"><b>4</b>회 창업 및 엑싯 경험</li>
      <li class="hx-chip" style="--i:1"><b>40</b>여 개 IT 서비스 출시</li>
      <li class="hx-chip" style="--i:2">AI Agent 상용화</li>
      <li class="hx-chip" style="--i:3"><b>100</b>여 개 기업 영업 · 제휴</li>
      <li class="hx-chip" style="--i:4">VC · 기관 투자유치</li>
    </ul>
  </div>
</section>
<script>
(function () {
  // JS-off fallback lives on <html class="no-js">; remove it the instant the
  // script runs so the CSS entry animations are free to play.
  var root = document.documentElement;
  if (root.classList.contains("no-js")) root.classList.remove("no-js");

  var hero = document.getElementById("hx-hero");
  if (!hero) return;

  var reduce = window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // Arm will-change only for the duration of the one-shot entry animation,
  // then drop it so no compositor layers linger on stages/chips.
  function disarm() {
    hero.classList.remove("is-armed");
  }

  function play() {
    if (reduce) {
      // reduce: jump straight to final state, no armed layers, no listeners.
      hero.classList.add("is-in");
      return;
    }
    hero.classList.add("is-armed");
    // requestAnimationFrame guarantees is-armed paints before is-in flips,
    // so transitions actually run.
    requestAnimationFrame(function () {
      hero.classList.add("is-in");
    });
    // Release will-change after the longest entry transition + buffer.
    setTimeout(disarm, 1500);
  }

  if (reduce || !("IntersectionObserver" in window)) {
    play();
  } else {
    var io = new IntersectionObserver(function (entries, obs) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          play();
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.2 });
    io.observe(hero);
  }

  if (reduce) return;

  var canvas = document.getElementById("hxNet");
  if (!canvas || !canvas.getContext) return;
  var ctx = canvas.getContext("2d");
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0, H = 0, pts = [], raf = 0;

  function size() {
    W = hero.clientWidth; H = hero.clientHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var count = Math.max(18, Math.min(46, Math.round((W * H) / 32000)));
    pts = [];
    for (var i = 0; i < count; i++) {
      pts.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.16, vy: (Math.random() - 0.5) * 0.16
      });
    }
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.3, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(175,170,255,0.55)";
      ctx.fill();
    }
    for (var a = 0; a < pts.length; a++) {
      for (var b = a + 1; b < pts.length; b++) {
        var dx = pts[a].x - pts[b].x, dy = pts[a].y - pts[b].y;
        var d2 = dx * dx + dy * dy;
        if (d2 < 18000) {
          var al = (1 - d2 / 18000) * 0.20;
          ctx.beginPath();
          ctx.moveTo(pts[a].x, pts[a].y);
          ctx.lineTo(pts[b].x, pts[b].y);
          ctx.strokeStyle = "rgba(140,130,235," + al.toFixed(3) + ")";
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
    raf = requestAnimationFrame(frame);
  }

  var ro = "ResizeObserver" in window ? new ResizeObserver(size) : null;
  if (ro) ro.observe(hero); else window.addEventListener("resize", size);
  size();
  frame();

  document.addEventListener("visibilitychange", function () {
    if (document.hidden) { cancelAnimationFrame(raf); raf = 0; }
    else if (!raf) frame();
  });
})();
</script>
</body>
</html>
